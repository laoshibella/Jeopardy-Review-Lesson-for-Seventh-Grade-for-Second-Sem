<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Grade 7 Jeopardy Interactive</title>
<style>
body{margin:0;background:#111;color:white;font-family:Arial;text-align:center}
#board{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:20px}
.cell{background:#1d4ed8;padding:25px;font-size:24px;border-radius:12px;cursor:pointer}
.cell:hover{background:#2563eb}
#viewer{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;justify-content:center;align-items:center;flex-direction:column}
img{max-width:90%;max-height:80vh;border-radius:15px}
button{margin-top:20px;padding:15px 30px;font-size:20px;border:none;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<h1>Grade 7 Jeopardy Game</h1>
<div style='margin:20px;'>Set Timer: <input id='setTime' type='number' value='60' min='5' style='padding:8px;font-size:18px;width:80px;'> seconds</div>
<div id='board'></div>
<div id='viewer'>
<div id='timer' style='font-size:40px;margin-bottom:20px;'>60</div>
<img id='slide'>
<button onclick='closeSlide()'>Back to Board</button>
</div>
<script>
const totalSlides=65;
const board=document.getElementById('board');
let currentCell;
let countdown;

for(let i=1;i<=totalSlides;i++){
 let d=document.createElement('div');
 d.className='cell';
 d.innerText=i;
 d.onclick=()=>openSlide(i,d);
 board.appendChild(d);
}

function openSlide(n,cell){
 currentCell=cell;
 document.getElementById('slide').src='game_assets/'+n+'.png';
 document.getElementById('viewer').style.display='flex';

 let time=parseInt(document.getElementById('setTime').value)||60;
 document.getElementById('timer').innerText=time;

 clearInterval(countdown);

 countdown=setInterval(()=>{
   time--;
   document.getElementById('timer').innerText=time;

   if(time<=0){
      clearInterval(countdown);
      alert('Time is up!');
   }
 },1000);
}

function closeSlide(){
 clearInterval(countdown);
 document.getElementById('viewer').style.display='none';

 if(currentCell){
   currentCell.style.visibility='hidden';
 }
}
</script>
</body>
</html>
