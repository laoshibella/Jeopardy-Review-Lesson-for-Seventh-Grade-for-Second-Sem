<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Grade 7 Jeopardy</title>
<style>
body{margin:0;background:#061539;color:white;font-family:Arial;text-align:center}
h1{margin:20px}
#board{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:20px;max-width:1400px;margin:auto}
.category{background:#102c7a;padding:20px;font-weight:bold;font-size:20px}
.cell{background:#1d4ed8;padding:30px;font-size:28px;cursor:pointer}
.cell:hover{background:#2563eb}
#viewer{display:none;position:fixed;inset:0;background:black;justify-content:center;align-items:center;flex-direction:column}
img{max-width:92%;max-height:80vh}
button,input{padding:10px;font-size:18px}
</style>
</head>
<body>
<h1>Grade 7 Jeopardy Game</h1>
<div>Timer: <input id='setTime' type='number' value='60'></div>
<div id='board'></div>
<div id='viewer'>
<div id='timer' style='font-size:42px'></div>
<img id='slide'>
<button onclick='closeSlide()'>Back to Game Board</button>
</div>
<script>
const categories=['Places','Weekend Activity','School Chores','Holidays','Months & Seasons','English'];
const points=[10,20,30,40,50];
const slideMap={
'Places':[1,2,3,4,5],
'Weekend Activity':[6,7,8,9,10],
'School Chores':[11,12,13,14,15],
'Holidays':[16,17,18,19,20],
'Months & Seasons':[21,22,23,24,25],
'English':[26,27,28,29,30]
};
const board=document.getElementById('board');
let currentCell,countdown;
categories.forEach(c=>{let d=document.createElement('div');d.className='category';d.innerText=c;board.appendChild(d)});
points.forEach((p,row)=>{categories.forEach(cat=>{let d=document.createElement('div');d.className='cell';d.innerText=p;d.onclick=()=>openSlide(slideMap[cat][row],d);board.appendChild(d);})});
function openSlide(n,cell){currentCell=cell;slide.src='game_assets/'+n+'.png';viewer.style.display='flex';let t=parseInt(setTime.value)||60;timer.innerText=t;clearInterval(countdown);countdown=setInterval(()=>{t--;timer.innerText=t;if(t<=0){clearInterval(countdown);alert('Time is up!')}},1000)}
function closeSlide(){clearInterval(countdown);viewer.style.display='none';if(currentCell)currentCell.style.visibility='hidden'}
</script>
</body>
</html>
